services:
  - type: web
    name: ediaspora-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: FRONTEND_URL
        value: https://ediaspora-ks.com
      - key: ALLOWED_ORIGINS
        value: https://ediaspora-ks.com,https://www.ediaspora-ks.com,https://e-diaspora.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: eDiaspora <noreply@ediaspora-ks.com>
