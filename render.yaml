services:
  - type: web
    name: ediaspora-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: FRONTEND_URL
        value: https://e-diaspora.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: eDiaspora <onboarding@resend.dev>
